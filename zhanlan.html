<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逛展护照 🎫</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0e17;color:#fffffe;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;min-height:100vh;}
input,textarea,button{font-family:inherit;}

/* 布局 */
#app{max-width:480px;margin:0 auto;padding:16px 16px 80px;}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,9,20,0.92);border-top:1px solid rgba(255,255,255,0.1);z-index:50;}
.nav-inner{max-width:480px;margin:0 auto;display:flex;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;background:none;border:none;color:rgba(255,255,255,0.35);cursor:pointer;font-size:12px;gap:3px;transition:color 0.2s;}
.nav-btn.active{color:#f43f5e;}
.nav-btn span:first-child{font-size:20px;}

/* 卡片 */
.card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:16px;}
.card-hero{background:linear-gradient(135deg,rgba(159,18,57,0.5),rgba(146,64,14,0.5));border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:20px;text-align:center;}

/* 输入 */
input[type=text],input[type=date],textarea{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:12px 16px;color:#fffffe;font-size:14px;outline:none;transition:border-color 0.2s;}
input:focus,textarea:focus{border-color:rgba(244,63,94,0.6);}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.2);}
textarea{resize:none;}

/* 按钮 */
.btn-primary{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#f43f5e,#f59e0b);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
.btn-primary:hover{opacity:0.88;}
.btn-ghost{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:10px 16px;color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;transition:background 0.2s;}
.btn-ghost:hover{background:rgba(255,255,255,0.14);}
.btn-sm{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.55);font-size:12px;cursor:pointer;transition:all 0.15s;}
.btn-sm.active{background:rgba(244,63,94,0.3);border-color:rgba(244,63,94,0.5);color:#fda4af;}
.btn-sm.active-amber{background:rgba(245,158,11,0.3);border-color:rgba(245,158,11,0.5);color:#fcd34d;}

/* 标签 */
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);cursor:pointer;transition:all 0.15s;}
.tag.selected{background:rgba(244,63,94,0.2);border-color:rgba(244,63,94,0.5);color:#fda4af;}

/* 星星 */
.stars{color:rgba(255,255,255,0.2);letter-spacing:2px;}
.stars .on{color:#f59e0b;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#1a1825;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border-top:1px solid rgba(255,255,255,0.1);}

/* toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;padding:10px 20px;border-radius:20px;font-size:13px;white-space:nowrap;color:#fff;}

/* 展览卡 */
.exhibit-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:14px;cursor:pointer;transition:background 0.15s;margin-bottom:10px;}
.exhibit-card:hover{background:rgba(255,255,255,0.09);}
.exhibit-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,rgba(159,18,57,0.4),rgba(146,64,14,0.4));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}

/* 护照 */
.passport-cover{background:linear-gradient(135deg,#fdf3e0,#e8d5b0);border-radius:20px;padding:24px;text-align:center;color:#5c3d0a;position:relative;overflow:hidden;}
.passport-cover::before{content:'';position:absolute;inset:0;opacity:0.04;background:repeating-linear-gradient(45deg,#8b4513 0,#8b4513 1px,transparent 0,transparent 14px);}

/* 印章 */
.stamp{width:48px;height:48px;border-radius:12px;border:2px solid rgba(244,63,94,0.5);background:rgba(244,63,94,0.1);display:inline-flex;align-items:center;justify-content:center;font-size:22px;}

/* 进度条 */
.progress-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#f43f5e,#f59e0b);border-radius:3px;transition:width 0.6s;}

/* 照片网格 */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.photo-grid img{aspect-ratio:1;object-fit:cover;border-radius:8px;width:100%;}

/* 徽章 */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;}
.badge-green{background:rgba(16,185,129,0.2);color:#6ee7b7;}
.badge-rose{background:rgba(244,63,94,0.15);color:#fda4af;}

/* fade in */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp 0.3s ease;}

/* 搜索区滚动隐藏滚动条 */
.scroll-x{overflow-x:auto;scrollbar-width:none;}
.scroll-x::-webkit-scrollbar{display:none;}
.flex-row{display:flex;gap:8px;flex-wrap:nowrap;}

/* setup */
.setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.avatar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px;}
.avatar-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:6px;font-size:20px;cursor:pointer;text-align:center;transition:all 0.15s;}
.avatar-btn.sel{background:rgba(244,63,94,0.3);border-color:rgba(244,63,94,0.6);}

/* 时间线 */
.timeline-item{display:flex;gap:12px;margin-bottom:12px;}
.timeline-dot{width:36px;height:36px;border-radius:10px;background:rgba(244,63,94,0.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}

h1{font-size:22px;font-weight:700;}
h2{font-size:18px;font-weight:600;}
h3{font-size:15px;font-weight:600;}
.muted{color:rgba(255,255,255,0.4);}
.muted-sm{color:rgba(255,255,255,0.25);font-size:11px;}
.text-rose{color:#f43f5e;}
.text-amber{color:#f59e0b;}
.text-green{color:#10b981;}
.gap4{gap:4px;}
.gap8{gap:8px;}
.gap12{gap:12px;}
.mb8{margin-bottom:8px;}
.mb12{margin-bottom:12px;}
.mb16{margin-bottom:16px;}
.mb20{margin-bottom:20px;}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.mt16{margin-top:16px;}
.flex{display:flex;}
.flex-1{flex:1;}
.items-center{align-items:center;}
.items-start{align-items:flex-start;}
.justify-between{justify-content:space-between;}
.wrap{flex-wrap:wrap;}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.text-center{text-align:center;}
.text-right{text-align:right;}
.bold{font-weight:600;}
.fs12{font-size:12px;}
.fs13{font-size:13px;}
.fs14{font-size:14px;}
.fs24{font-size:24px;}
.fs32{font-size:32px;}
.fs48{font-size:48px;}
.w100{width:100%;}
.relative{position:relative;}
.absolute{position:absolute;}
.hidden{display:none;}
.pointer{cursor:pointer;}
.space-y>*+*{margin-top:10px;}
</style>
</head>
<body>
<div id="app"></div>
<div id="modals"></div>
<div id="toasts"></div>

<script>
// ===== 预置展览 =====
const PRESET_EXHIBITS = [
  {id:'e1',name:'梵高·星空之夜沉浸展',venue:'上海·西岸美术馆',city:'上海',type:'沉浸式',cover:'🌌',desc:'全球巡回梵高沉浸式艺术展，360°星空投影，仿佛走入画中世界。',startDate:'2026-01-01',endDate:'2026-06-30',userAdded:false},
  {id:'e2',name:'故宫·千里江山特展',venue:'北京·故宫博物院',city:'北京',type:'博物馆',cover:'🏔️',desc:'北宋王希孟《千里江山图》真迹特展，限量预约，一生必看。',startDate:'2026-02-01',endDate:'2026-05-31',userAdded:false},
  {id:'e3',name:'草间弥生·无限镜屋',venue:'上海·龙美术馆',city:'上海',type:'当代艺术',cover:'🔴',desc:'无限延伸的镜面空间，草间弥生标志性波点装置，排队两小时值得。',startDate:'2026-03-01',endDate:'2026-07-31',userAdded:false},
  {id:'e4',name:'自然之境·雨林生态展',venue:'广州·广东省博物馆',city:'广州',type:'自然科学',cover:'🌿',desc:'真实热带雨林植物与多媒体结合，沉浸式探索地球生态系统。',startDate:'2026-01-15',endDate:'2026-08-15',userAdded:false},
  {id:'e5',name:'包豪斯百年设计回顾展',venue:'北京·UCCA尤伦斯',city:'北京',type:'设计艺术',cover:'⬜',desc:'纵览百年包豪斯设计遗产，现代设计DNA的起源。',startDate:'2026-02-15',endDate:'2026-06-15',userAdded:false},
  {id:'e6',name:'AI创作艺术节',venue:'成都·东郊记忆',city:'成都',type:'科技艺术',cover:'🤖',desc:'人工智能与艺术家共同创作的视觉盛宴，可与作品实时互动。',startDate:'2026-03-20',endDate:'2026-05-20',userAdded:false},
  {id:'e7',name:'宇宙漫游·NASA太空摄影展',venue:'深圳·南山博物馆',city:'深圳',type:'摄影展',cover:'🚀',desc:'NASA官方授权，数十张震撼宇宙真实影像，令人泪目。',startDate:'2026-01-20',endDate:'2026-07-20',userAdded:false},
  {id:'e8',name:'街头涂鸦·城市墙面艺术节',venue:'上海·M50创意园',city:'上海',type:'街头艺术',cover:'🎨',desc:'国际街头艺术家现场创作，整条街巷变成流动美术馆。',startDate:'2026-04-01',endDate:'2026-09-30',userAdded:false},
];

const EXHIBIT_TYPES = ['沉浸式','博物馆','当代艺术','自然科学','设计艺术','科技艺术','摄影展','街头艺术','装置艺术','快闪展','艺术节','音乐现场','其他'];
const QUICK_TAGS = ['值得二刷','哭了','人太多','性价比高','必须预约','带娃友好','网红打卡','适合独行','需要讲解','灯光绝了','内容深度','互动感强','高冷难懂','票价偏贵'];
const TASTE_MAP = {沉浸式:'immersive',博物馆:'classic',当代艺术:'contemporary',自然科学:'nature',设计艺术:'design',科技艺术:'tech',摄影展:'photo',街头艺术:'street',装置艺术:'contemporary',快闪展:'immersive',艺术节:'contemporary',音乐现场:'street'};
const TASTES = {classic:{l:'古典美学',e:'🏛️'},contemporary:{l:'当代先锋',e:'🔺'},immersive:{l:'沉浸体验',e:'🌌'},nature:{l:'自然探索',e:'🌿'},design:{l:'设计迷',e:'⚡'},street:{l:'街头文化',e:'🎨'},tech:{l:'科技前沿',e:'🤖'},photo:{l:'影像控',e:'📷'}};
const STAMP_MAP = {沉浸式:'🌌',博物馆:'🏛️',当代艺术:'🔺',自然科学:'🌿',设计艺术:'⚡',科技艺术:'🤖',摄影展:'📷',街头艺术:'🎨',装置艺术:'🎭',快闪展:'✨',艺术节:'🎪',音乐现场:'🎵',其他:'🎫'};

// ===== 存储 =====
function save(){localStorage.setItem('zl2_data',JSON.stringify(data));}
function initData(){
  return {
    user:null,setupDone:false,tab:'discover',
    exhibits:JSON.parse(JSON.stringify(PRESET_EXHIBITS)),
    reviews:[],
    passport:{checkins:[],stamps:[]}
  };
}
let data;
try{data=JSON.parse(localStorage.getItem('zl2_data')||'null')||initData();}
catch(e){data=initData();}

// ===== 工具 =====
function $(id){return document.getElementById(id);}
function toast(msg,c='ok'){
  const el=document.createElement('div');
  el.className='toast';
  el.style.background=c==='err'?'#dc2626':c==='warn'?'#d97706':'#059669';
  el.textContent=msg;
  $('toasts').appendChild(el);
  setTimeout(()=>el.remove(),2500);
}
function closeModal(){$('modals').innerHTML='';render();}
function getEx(id){return data.exhibits.find(e=>e.id===id);}
function getRevs(eid){return data.reviews.filter(r=>r.exhibitId===eid);}
function avgRating(eid){const rs=getRevs(eid).filter(r=>r.rating>0);return rs.length?(rs.reduce((a,r)=>a+r.rating,0)/rs.length).toFixed(1):0;}
function getCheckin(eid){return data.passport.checkins.find(c=>c.exhibitId===eid);}
function fmtDate(ts){const d=new Date(ts);return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function starsHTML(n,sz=16){return[1,2,3,4,5].map(i=>`<span style="color:${i<=n?'#f59e0b':'rgba(255,255,255,0.18)'};font-size:${sz}px">★</span>`).join('');}
function tasteProfile(){
  const c={};
  data.passport.checkins.forEach(ch=>{const ex=getEx(ch.exhibitId);if(!ex)return;const t=TASTE_MAP[ex.type]||'contemporary';c[t]=(c[t]||0)+1;});
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([id,cnt])=>({id,...TASTES[id],cnt})).filter(x=>x.l);
}

// ===== 渲染主控 =====
function render(){
  if(!data.setupDone){renderSetup();return;}
  $('app').innerHTML=`${renderNav()}<div id="page" class="fade"></div>`;
  const page=$('page');
  if(data.tab==='discover')page.innerHTML=renderDiscover();
  else if(data.tab==='passport')page.innerHTML=renderPassport();
  else if(data.tab==='add')page.innerHTML=renderAdd();
  else if(data.tab==='profile')page.innerHTML=renderProfile();
  bindEvents();
}
function setTab(t){data.tab=t;save();render();}

// ===== 导航 =====
function renderNav(){
  const tabs=[{id:'discover',l:'发现',e:'🔍'},{id:'passport',l:'护照',e:'🎫'},{id:'add',l:'收录',e:'➕'},{id:'profile',l:'我的',e:'👤'}];
  return `<nav><div class="nav-inner">${tabs.map(t=>`<button class="nav-btn ${data.tab===t.id?'active':''}" onclick="setTab('${t.id}')"><span>${t.e}</span><span>${t.l}</span></button>`).join('')}</div></nav>`;
}

// ===== 设置 =====
const AVATARS=['🎫','🎨','🏛️','📷','🌿','🔺','🤖','🌌','⭐','🎭','🦋','🎪','🌙','🎯'];
function renderSetup(){
  const av=data.user?.avatar||'🎫';
  $('app').innerHTML=`
  <div class="setup-wrap">
    <div style="width:100%;max-width:360px;">
      <div class="text-center mb20">
        <div class="fs48 mb8">🎫</div>
        <h1 style="background:linear-gradient(135deg,#f43f5e,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:28px;">逛展护照</h1>
        <p class="muted fs13 mt8">记录你的每一次观展足迹</p>
      </div>
      <div class="card" style="padding:20px;">
        <h3 class="text-center mb16" style="color:rgba(255,255,255,0.8);">办理你的专属护照</h3>
        <input type="text" id="sname" maxlength="12" placeholder="你的昵称" value="${data.user?.name||''}" style="margin-bottom:10px;">
        <input type="text" id="scity" maxlength="8" placeholder="所在城市（如：上海）" value="${data.user?.city||''}" style="margin-bottom:16px;">
        <p class="muted-sm mb8">选一个头像</p>
        <div class="avatar-grid mb16">
          ${AVATARS.map(e=>`<button class="avatar-btn${av===e?' sel':''}" onclick="pickAv('${e}')">${e}</button>`).join('')}
        </div>
        <button class="btn-primary" onclick="finishSetup()">领取我的护照 🎫</button>
      </div>
      <p class="text-center muted-sm mt8">数据仅存本地，不上传任何服务器</p>
    </div>
  </div>`;
}
window.pickAv=e=>{if(!data.user)data.user={name:'',avatar:'🎫',city:''};data.user.avatar=e;save();renderSetup();};
window.finishSetup=()=>{
  const name=$('sname')?.value?.trim();
  const city=$('scity')?.value?.trim();
  if(!name){toast('给自己起个名字吧','err');return;}
  data.user={name,city:city||'未知城市',avatar:data.user?.avatar||'🎫',joined:Date.now()};
  data.setupDone=true;save();toast('🎫 护照办好了！');render();
};

// ===== 发现页 =====
let _fType='',_fCity='',_fQ='';
function renderDiscover(){
  const cities=[...new Set(data.exhibits.map(e=>e.city))];
  const list=data.exhibits.filter(e=>{
    if(_fType&&e.type!==_fType)return false;
    if(_fCity&&e.city!==_fCity)return false;
    if(_fQ&&!e.name.includes(_fQ)&&!e.venue.includes(_fQ))return false;
    return true;
  });
  return `
  <div>
    <div class="flex items-center justify-between mb16">
      <h2>发现展览</h2>
      <span class="muted fs12">${data.exhibits.length} 个展览</span>
    </div>
    <div class="relative mb12">
      <input type="text" id="search-q" placeholder="搜索展览或场馆…" value="${_fQ}" oninput="filterChange()">
    </div>
    <div class="scroll-x mb8"><div class="flex-row">
      <button class="btn-sm ${!_fCity?'active':''}" onclick="_fCity='';filterChange()">全部城市</button>
      ${cities.map(c=>`<button class="btn-sm ${_fCity===c?'active':''}" onclick="_fCity='${c}';filterChange()">${c}</button>`).join('')}
    </div></div>
    <div class="scroll-x mb16"><div class="flex-row">
      <button class="btn-sm ${!_fType?'active-amber':''}" onclick="_fType='';filterChange()">全类型</button>
      ${EXHIBIT_TYPES.slice(0,8).map(t=>`<button class="btn-sm ${_fType===t?'active-amber':''}" onclick="_fType='${t}';filterChange()">${t}</button>`).join('')}
    </div></div>
    <div id="ex-list">${renderExList(list)}</div>
  </div>`;
}
window.filterChange=()=>{_fQ=$('search-q')?.value||'';const el=$('ex-list');if(el){const list=data.exhibits.filter(e=>{if(_fType&&e.type!==_fType)return false;if(_fCity&&e.city!==_fCity)return false;if(_fQ&&!e.name.includes(_fQ)&&!e.venue.includes(_fQ))return false;return true;});el.innerHTML=renderExList(list);}};
function renderExList(list){
  if(!list.length)return`<div class="text-center muted" style="padding:48px 0;">没有找到符合条件的展览</div>`;
  return list.map(e=>{
    const avg=avgRating(e.id),cnt=getRevs(e.id).length,chk=!!getCheckin(e.id);
    return`<div class="exhibit-card" onclick="openEx('${e.id}')">
      <div class="flex items-center gap12">
        <div class="exhibit-icon">${e.cover}</div>
        <div class="flex-1" style="min-width:0;">
          <div class="flex items-center gap8 mb8">
            <span class="bold fs14 truncate flex-1">${e.name}</span>
            ${chk?'<span class="badge badge-green">✓已逛</span>':''}
          </div>
          <div class="muted fs12 mb8 truncate">${e.venue}</div>
          <div class="flex items-center gap8">
            <span class="badge" style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);">${e.type}</span>
            ${avg>0?`<span class="text-amber fs12">★ ${avg}</span><span class="muted-sm">(${cnt})</span>`:'<span class="muted-sm">暂无评分</span>'}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== 展览详情 =====
window.openEx=id=>{
  const e=getEx(id);if(!e)return;
  const revs=getRevs(id),avg=avgRating(id),chk=getCheckin(id);
  const allTags={};revs.forEach(r=>r.tags?.forEach(t=>{allTags[t]=(allTags[t]||0)+1;}));
  const topTags=Object.entries(allTags).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const photos=revs.flatMap(r=>r.photos||[]);
  $('modals').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div style="background:linear-gradient(135deg,rgba(159,18,57,0.7),rgba(146,64,14,0.7));padding:24px;text-align:center;position:relative;">
        <button onclick="closeModal()" style="position:absolute;top:12px;right:16px;background:none;border:none;color:rgba(255,255,255,0.4);font-size:20px;cursor:pointer;">✕</button>
        <div style="font-size:52px;margin-bottom:10px;">${e.cover}</div>
        <h2 style="margin-bottom:4px;">${e.name}</h2>
        <p class="muted fs13">${e.venue}</p>
        <div class="flex items-center justify-center gap8 mt8">
          <span class="badge" style="background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);">${e.type}</span>
          <span class="muted fs12">${e.city}</span>
        </div>
        ${avg>0?`<div style="margin-top:10px;">${starsHTML(Math.round(avg),18)}<span class="text-amber bold" style="margin-left:6px;">${avg}</span><span class="muted-sm" style="margin-left:4px;">(${revs.length}条)</span></div>`:'<p class="muted-sm" style="margin-top:8px;">暂无评分</p>'}
      </div>
      <div style="padding:20px;" class="space-y">
        <p class="muted fs13" style="line-height:1.7;">${e.desc}</p>
        ${topTags.length?`<div><p class="muted-sm mb8">大家都说</p><div class="flex wrap gap8">${topTags.map(([t,n])=>`<span class="tag">${t} <span style="color:rgba(255,255,255,0.25)">×${n}</span></span>`).join('')}</div></div>`:''}
        ${photos.length?`<div><p class="muted-sm mb8">现场照片 (${photos.length})</p><div class="photo-grid">${photos.slice(0,9).map(p=>`<img src="${p}">`).join('')}</div></div>`:''}
        <div class="flex gap8">
          <button class="btn-primary" onclick="openReview('${e.id}')">${chk?'再写一条评价 ✍️':'我逛过这个展 ✍️'}</button>
          ${!chk?`<button class="btn-ghost" onclick="doCheckin('${e.id}',true)">仅打卡</button>`:''}
        </div>
        ${revs.length?`<div><p class="bold fs13 mb12" style="color:rgba(255,255,255,0.7);">全部评价 (${revs.length})</p><div class="space-y">${revs.slice().reverse().map(r=>`<div class="card"><div class="flex items-center gap8 mb8"><span style="font-size:20px;">${r.ua||'🎫'}</span><span class="bold fs13">${r.un}</span><span class="muted-sm" style="margin-left:auto;">${fmtDate(r.ts)}</span></div>${r.rating?`<div style="margin-bottom:6px;">${starsHTML(r.rating,13)}</div>`:''} ${r.text?`<p class="fs13" style="color:rgba(255,255,255,0.65);line-height:1.6;margin-bottom:6px;">${r.text}</p>`:''} ${r.tags?.length?`<div class="flex wrap gap4">${r.tags.map(t=>`<span class="badge badge-rose">${t}</span>`).join('')}</div>`:''} ${r.photos?.length?`<div class="photo-grid" style="margin-top:8px;">${r.photos.map(p=>`<img src="${p}">`).join('')}</div>`:''}</div>`).join('')}</div></div>`:`<p class="text-center muted fs13" style="padding:20px 0;">还没有评价，来写第一条吧</p>`}
      </div>
    </div>
  </div>`;
};

// ===== 写评价 =====
let _rv={rating:0,text:'',tags:[],photos:[]};
window.openReview=eid=>{_rv={rating:0,text:'',tags:[],photos:[]};renderRevModal(eid);};
function renderRevModal(eid){
  const e=getEx(eid);
  $('modals').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" style="padding:20px;">
      <div class="flex items-center justify-between mb16">
        <div><div class="bold fs14">${e.name}</div><div class="muted fs12">${e.venue}</div></div>
        <button onclick="closeModal()" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div class="mb16">
        <p class="muted-sm mb8">综合评分</p>
        <div class="flex gap4">${[1,2,3,4,5].map(i=>`<span onclick="setRv(${i},'${eid}')" style="font-size:32px;cursor:pointer;color:${_rv.rating>=i?'#f59e0b':'rgba(255,255,255,0.18)'};">★</span>`).join('')}<span class="muted fs12" style="align-self:center;margin-left:8px;">${['','太差了','不推荐','还可以','推荐','强烈推荐'][_rv.rating]||''}</span></div>
      </div>
      <div class="mb16">
        <p class="muted-sm mb8">快捷标签（可多选）</p>
        <div class="flex wrap gap8">${QUICK_TAGS.map(t=>`<span class="tag${_rv.tags.includes(t)?' selected':''}" onclick="toggleTag('${t}','${eid}')">${t}</span>`).join('')}</div>
      </div>
      <div class="mb16">
        <p class="muted-sm mb8">说点什么（可选）</p>
        <textarea id="rv-text" placeholder="写下你的观展感受……" rows="3" oninput="_rv.text=this.value">${_rv.text}</textarea>
      </div>
      <div class="mb16">
        <p class="muted-sm mb8">上传现场照片（最多4张）</p>
        <div class="flex wrap gap8" id="photo-prev">
          ${_rv.photos.map((p,i)=>`<div style="position:relative;"><img src="${p}" style="width:64px;height:64px;object-fit:cover;border-radius:10px;"><button onclick="rmPhoto(${i},'${eid}')" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:#ef4444;border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;">✕</button></div>`).join('')}
          ${_rv.photos.length<4?`<label style="width:64px;height:64px;border:2px dashed rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;color:rgba(255,255,255,0.2);">+<input type="file" accept="image/*" multiple class="hidden" onchange="addPhotos(this,'${eid}')"></label>`:''}
        </div>
      </div>
      <button class="btn-primary" onclick="submitRev('${eid}')">提交评价并打卡 🎫</button>
    </div>
  </div>`;
}
window.setRv=(n,eid)=>{_rv.rating=n;renderRevModal(eid);};
window.toggleTag=(t,eid)=>{const i=_rv.tags.indexOf(t);i>=0?_rv.tags.splice(i,1):_rv.tags.push(t);renderRevModal(eid);};
window.addPhotos=(inp,eid)=>{
  Array.from(inp.files).slice(0,4-_rv.photos.length).forEach(f=>{
    if(f.size>5*1024*1024){toast('单张不超过5MB','warn');return;}
    const r=new FileReader();r.onload=e=>{_rv.photos.push(e.target.result);renderRevModal(eid);};r.readAsDataURL(f);
  });
};
window.rmPhoto=(i,eid)=>{_rv.photos.splice(i,1);renderRevModal(eid);};
window.submitRev=eid=>{
  const text=$('rv-text')?.value?.trim()||_rv.text;
  if(!_rv.rating&&!text&&!_rv.tags.length){toast('至少留下评分或标签','warn');return;}
  data.reviews.push({id:'r'+Date.now(),exhibitId:eid,un:data.user.name,ua:data.user.avatar,rating:_rv.rating,text,tags:[..._rv.tags],photos:[..._rv.photos],ts:Date.now()});
  doCheckin(eid,false);save();toast('🎫 评价提交，护照盖章！');closeModal();
};
window.doCheckin=(eid,closeAfter)=>{
  if(!getCheckin(eid)){
    const ex=getEx(eid);
    const stamp=STAMP_MAP[ex?.type]||'🎫';
    data.passport.checkins.push({exhibitId:eid,ts:Date.now()});
    if(!data.passport.stamps.includes(stamp))data.passport.stamps.push(stamp);
    save();
  }
  if(closeAfter){toast('✓ 打卡成功！');closeModal();}
};

// ===== 护照页 =====

  return`<div>

          <div><div style="font-size:22px;font-weight:700;color:#5c3d0a;">${data.reviews.length}</div><div style="font-size:11px;color:#8b6334;">发表评价</div></div>
          <div><div style="font-size:22px;font-weight:700;color:#5c3d0a;">${types.length}</div><div style="font-size:11px;color:#8b6334;">展览类型</div></div>
        </div>

    ${taste.length?`<div class="card mb16"><p class="bold fs13 mb12" style="color:rgba(255,255,255,0.7);">✨ 审美画像</p><div class="flex gap8 mb12">${taste.map((t,i)=>`<div class="flex-1 text-center" style="background:rgba(255,255,255,0.06);border-radius:14px;padding:12px;${i===0?'border:1px solid rgba(244,63,94,0.4);':''}"><div style="font-size:24px;margin-bottom:4px;">${t.e}</div><div class="bold fs12" style="color:${i===0?'#fda4af':'rgba(255,255,255,0.6)'};">${t.l}</div>${i===0?'<div class="muted-sm">主要偏好</div>':''}</div>`).join('')}</div><p class="muted fs12">${taste[0]?.l}偏好者，通常钟情深度体验与视觉冲击。</p></div>`:''}
    ${data.passport.stamps.length?`<div class="card mb16"><p class="bold fs13 mb12" style="color:rgba(255,255,255,0.7);">🔖 收集的章 (${data.passport.stamps.length})</p><div class="flex wrap gap8">${data.passport.stamps.map(s=>`<div class="stamp">${s}</div>`).join('')}</div></div>`:''}
    <div class="card"><p class="bold fs13 mb16" style="color:rgba(255,255,255,0.7);">📅 观展足迹</p>
    ${!cks.length?`<div class="text-center muted" style="padding:32px 0;"><div style="font-size:32px;margin-bottom:8px;">📭</div>还没有观展记录，去打卡第一个展吧！</div>`:`<div class="space-y">${cks.slice().reverse().map(c=>{const ex=getEx(c.exhibitId);if(!ex)return'';const rv=data.reviews.find(r=>r.exhibitId===c.exhibitId);return`<div class="timeline-item pointer" onclick="openEx('${c.exhibitId}')"><div class="timeline-dot">${ex.cover}</div><div class="flex-1"><div class="bold fs14">${ex.name}</div><div class="muted fs12">${ex.venue} · ${fmtDate(c.ts)}</div>${rv?.rating?`<div style="margin-top:4px;">${starsHTML(rv.rating,12)}</div>`:''} ${rv?.text?`<p class="fs12 muted" style="margin-top:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${rv.text}</p>`:''}</div></div>`;}).join('')}</div>`}
    </div>
  </div>`;
}

// ===== 收录页 =====
let _add={name:'',venue:'',city:'',type:'',cover:'🎫',desc:'',startDate:'',endDate:''};
function renderAdd(){
  return`<div>
    <h2 class="mb8">收录新展览</h2>
    <p class="muted fs13 mb20">把你发现的好展览分享给大家</p>
    <div class="space-y">
      <div><p class="muted-sm mb8">展览名称 *</p><input type="text" id="a-name" placeholder="完整展览名称" maxlength="40" value="${_add.name}" oninput="_add.name=this.value"></div>
      <div><p class="muted-sm mb8">场馆 *</p><input type="text" id="a-venue" placeholder="如：上海·龙美术馆" maxlength="30" value="${_add.venue}" oninput="_add.venue=this.value"></div>
      <div class="flex gap8">
        <div class="flex-1"><p class="muted-sm mb8">城市 *</p><input type="text" id="a-city" placeholder="城市" maxlength="8" value="${_add.city}" oninput="_add.city=this.value"></div>
        <div style="width:100px;"><p class="muted-sm mb8">封面</p><input type="text" id="a-cover" placeholder="emoji" maxlength="4" value="${_add.cover}" oninput="_add.cover=this.value" style="text-align:center;"></div>
      </div>
      <div><p class="muted-sm mb8">展览类型 *</p><div class="flex wrap gap8">${EXHIBIT_TYPES.map(t=>`<span class="tag${_add.type===t?' selected':''}" onclick="_add.type='${t}';reRenderAdd()">${t}</span>`).join('')}</div></div>
      <div><p class="muted-sm mb8">简介</p><textarea id="a-desc" placeholder="描述一下这个展览…" rows="3" oninput="_add.desc=this.value">${_add.desc}</textarea></div>
      <div class="flex gap8">
        <div class="flex-1"><p class="muted-sm mb8">开始日期</p><input type="date" value="${_add.startDate}" onchange="_add.startDate=this.value"></div>
        <div class="flex-1"><p class="muted-sm mb8">结束日期</p><input type="date" value="${_add.endDate}" onchange="_add.endDate=this.value"></div>
      </div>
      <button class="btn-primary" onclick="submitAdd()">收录这个展览 ✓</button>
    </div>
  </div>`;
}
window.reRenderAdd=()=>{$('page').innerHTML=renderAdd();};
window.submitAdd=()=>{
  _add.name=$('a-name')?.value?.trim()||_add.name;
  _add.venue=$('a-venue')?.value?.trim()||_add.venue;
  _add.city=$('a-city')?.value?.trim()||_add.city;
  _add.desc=$('a-desc')?.value?.trim()||_add.desc;
  _add.cover=$('a-cover')?.value?.trim()||_add.cover;
  if(!_add.name||!_add.venue||!_add.city||!_add.type){toast('名称/场馆/城市/类型必填','warn');return;}
  data.exhibits.push({id:'u'+Date.now(),name:_add.name,venue:_add.venue,city:_add.city,type:_add.type,cover:_add.cover||'🎫',desc:_add.desc||'暂无简介',startDate:_add.startDate,endDate:_add.endDate,userAdded:true});
  _add={name:'',venue:'',city:'',type:'',cover:'🎫',desc:'',startDate:'',endDate:''};
  save();toast('🎉 展览已收录！');setTab('discover');
};

  const myRevs=data.reviews.filter(r=>r.un===data.user.name),taste=tasteProfile();

    <button onclick="if(confirm('确定清空所有数据？'))resetAll()" style="width:100%;padding:14px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.25);font-size:13px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.12)';this.style.color='#f87171';" onmouseout="this.style.background='rgba(255,255,255,0.04)';this.style.color='rgba(255,255,255,0.25)';">清空数据重新开始</button>
  </div>`;
}
window.openEditProfile=()=>{
  $('modals').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" style="padding:20px;">
      <div class="flex justify-between items-center mb16"><div class="bold">编辑资料</div><button onclick="closeModal()" style="background:none;border:none;color:rgba(255,255,255,0.3);font-size:18px;cursor:pointer;">✕</button></div>
      <input type="text" id="e-name" maxlength="12" placeholder="昵称" value="${data.user.name}" style="margin-bottom:10px;">
      <input type="text" id="e-city" maxlength="8" placeholder="城市" value="${data.user.city}" style="margin-bottom:16px;">
      <div class="avatar-grid mb16">${AVATARS.map(e=>`<button class="avatar-btn${data.user.avatar===e?' sel':''}" onclick="data.user.avatar='${e}';save();closeModal();render();">${e}</button>`).join('')}</div>
      <button class="btn-primary" onclick="saveProfile()">保存</button>
    </div>
  </div>`;
};
window.saveProfile=()=>{
  const name=$('e-name')?.value?.trim();
  if(!name){toast('名字不能为空','err');return;}
  data.user.name=name;data.user.city=$('e-city')?.value?.trim()||data.user.city;save();toast('已保存');closeModal();
};
window.resetAll=()=>{localStorage.removeItem('zl2_data');data=initData();render();};
function bindEvents(){}

render();
</script>
