<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>逛展护照 🎫</title>
<style>
/* === 莫兰迪波点背景配色 === */
*{box-sizing:border-box;margin:0;padding:0;}
body{
  color:#2a2030;
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  min-height:100vh;
  background-color:#ede8e4;
}
#app{position:relative;z-index:1;}
input,textarea,button{font-family:inherit;}

/* 布局 */
#app{max-width:480px;margin:0 auto;padding:16px 16px 80px;}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(220,210,232,0.92);backdrop-filter:blur(12px);border-top:1px solid rgba(160,140,180,0.25);z-index:50;}
.nav-inner{max-width:480px;margin:0 auto;display:flex;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;background:none;border:none;color:rgba(80,60,105,0.55);cursor:pointer;font-size:12px;gap:3px;transition:color 0.2s;font-weight:500;}
.nav-btn.active{color:#6a4e7a;font-weight:700;}
.nav-btn span:first-child{font-size:20px;}

/* 卡片 */
.card{background:rgba(255,252,255,0.62);border:1px solid rgba(180,165,200,0.3);border-radius:18px;padding:16px;backdrop-filter:blur(8px);}
.card-hero{background:linear-gradient(135deg,rgba(200,180,220,0.4),rgba(175,210,200,0.4));border:1px solid rgba(180,165,200,0.3);border-radius:18px;padding:20px;text-align:center;}

/* 输入 */
input[type=text],input[type=date],textarea{width:100%;background:rgba(255,252,255,0.7);border:1px solid rgba(180,165,200,0.35);border-radius:14px;padding:12px 16px;color:#2a2030;font-size:14px;outline:none;transition:border-color 0.2s;}
input:focus,textarea:focus{border-color:rgba(140,105,165,0.5);}
input::placeholder,textarea::placeholder{color:rgba(120,105,140,0.35);}
textarea{resize:none;}

/* 按钮 */
.btn-primary{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#9b7eb8,#7db8a0);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
.btn-primary:hover{opacity:0.88;}
.btn-ghost{background:rgba(200,185,220,0.3);border:1px solid rgba(180,165,200,0.35);border-radius:14px;padding:10px 16px;color:rgba(70,52,95,0.85);font-size:13px;cursor:pointer;transition:background 0.2s;}
.btn-ghost:hover{background:rgba(200,185,220,0.5);}
.btn-sm{padding:6px 14px;border-radius:20px;border:1px solid rgba(160,145,180,0.35);background:rgba(255,252,255,0.55);color:rgba(80,62,105,0.7);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.btn-sm.active{background:rgba(155,126,184,0.22);border-color:rgba(130,100,160,0.55);color:#5e4272;font-weight:700;}
.btn-sm.active-amber{background:rgba(110,170,145,0.2);border-color:rgba(100,160,135,0.5);color:#2e7a5e;font-weight:700;}

/* 标签 */
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;border:1px solid rgba(180,165,200,0.3);background:rgba(240,235,248,0.6);color:rgba(110,90,130,0.7);cursor:pointer;transition:all 0.15s;}
.tag.selected{background:rgba(155,126,184,0.18);border-color:rgba(155,126,184,0.5);color:#7a5e8a;}

/* 星星 */
.stars{color:rgba(120,100,140,0.2);letter-spacing:2px;}
.stars .on{color:#c8945a;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(180,165,200,0.45);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#f5f0fa;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border-top:1px solid rgba(180,165,200,0.4);}

/* toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;padding:10px 20px;border-radius:20px;font-size:13px;white-space:nowrap;color:#fff;}

/* 展览卡 */
.exhibit-card{background:rgba(255,252,255,0.6);border:1px solid rgba(180,165,200,0.25);border-radius:16px;padding:14px;cursor:pointer;transition:all 0.15s;margin-bottom:10px;backdrop-filter:blur(6px);}
.exhibit-card:hover{background:rgba(255,252,255,0.85);border-color:rgba(155,126,184,0.4);transform:translateY(-1px);box-shadow:0 4px 20px rgba(155,126,184,0.12);}
.exhibit-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,rgba(200,180,220,0.5),rgba(175,210,200,0.5));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}

/* 护照 */
.passport-cover{background:linear-gradient(135deg,#fdf0ee,#ecdff0);border-radius:20px;padding:24px;text-align:center;color:#5c4565;position:relative;overflow:hidden;}
.passport-cover::before{content:'';position:absolute;inset:0;opacity:0.03;background:repeating-linear-gradient(45deg,#9b7eb8 0,#9b7eb8 1px,transparent 0,transparent 14px);}

/* 印章 */
.stamp{width:48px;height:48px;border-radius:12px;border:2px solid rgba(155,126,184,0.5);background:rgba(155,126,184,0.1);display:inline-flex;align-items:center;justify-content:center;font-size:22px;}

/* 进度条 */
.progress-bar{height:6px;background:rgba(155,126,184,0.15);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#9b7eb8,#7db8a0);border-radius:3px;transition:width 0.6s;}

/* 照片网格 */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}
.photo-grid img{aspect-ratio:1;object-fit:cover;border-radius:8px;width:100%;}

/* 徽章 */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;}
.badge-green{background:rgba(100,180,140,0.18);color:#3a8a62;}
.badge-rose{background:rgba(155,126,184,0.15);color:#7a5e8a;}
.mb10{margin-bottom:10px;}.mb14{margin-bottom:14px;}

/* fade in */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp 0.3s ease;}

/* 搜索区滚动隐藏滚动条 */
.scroll-x{overflow-x:auto;scrollbar-width:none;}
.scroll-x::-webkit-scrollbar{display:none;}
.flex-row{display:flex;gap:8px;flex-wrap:nowrap;}

/* setup */
.setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.avatar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px;}
.avatar-btn{background:rgba(255,252,255,0.6);border:1px solid rgba(180,165,200,0.3);border-radius:12px;padding:6px;font-size:20px;cursor:pointer;text-align:center;transition:all 0.15s;}
.avatar-btn.sel{background:rgba(155,126,184,0.2);border-color:rgba(155,126,184,0.6);}

/* 时间线 */
.timeline-item{display:flex;gap:12px;margin-bottom:12px;}
.timeline-dot{width:36px;height:36px;border-radius:10px;background:rgba(155,126,184,0.15);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}

h1{font-size:22px;font-weight:700;}
h2{font-size:18px;font-weight:600;}
h3{font-size:15px;font-weight:600;}
.muted{color:rgba(70,55,90,0.65);}
.muted-sm{color:rgba(80,65,100,0.55);font-size:11px;}
.text-rose{color:#f43f5e;}
.text-amber{color:#f59e0b;}
.text-green{color:#10b981;}
.gap4{gap:4px;}
.gap8{gap:8px;}
.gap12{gap:12px;}
.mb8{margin-bottom:8px;}
.mb12{margin-bottom:12px;}
.mb16{margin-bottom:16px;}
.mb20{margin-bottom:20px;}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.mt16{margin-top:16px;}
.flex{display:flex;}
.flex-1{flex:1;}
.items-center{align-items:center;}
.items-start{align-items:flex-start;}
.justify-between{justify-content:space-between;}
.wrap{flex-wrap:wrap;}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.text-center{text-align:center;}
.text-right{text-align:right;}
.bold{font-weight:600;}
.fs12{font-size:12px;}
.fs13{font-size:13px;}
.fs14{font-size:14px;}
.fs24{font-size:24px;}
.fs32{font-size:32px;}
.fs48{font-size:48px;}
.w100{width:100%;}
.relative{position:relative;}
.absolute{position:absolute;}
.hidden{display:none;}
.pointer{cursor:pointer;}
.space-y>*+*{margin-top:10px;}
</style>
</head>

// ===== 存储 =====
function save(){localStorage.setItem('zl2_data',JSON.stringify(data));}
function initData(){
  return {
    user:null,setupDone:false,tab:'discover',
    exhibits:JSON.parse(JSON.stringify(PRESET_EXHIBITS)),
    reviews:JSON.parse(JSON.stringify(DEMO_REVIEWS)),
    passport:{checkins:[],stamps:[]},
    _demoRev:'v3' // 版本号，用于强制更新demo评价
  };
}
let data;
try{
  data=JSON.parse(localStorage.getItem('zl2_data')||'null')||initData();
  // 强制注入最新demo评价（版本不匹配时）
  if(data._demoRev !== 'v3'){
    const userRevIds = new Set(data.reviews.filter(r=>!r.id.startsWith('dr')).map(r=>r.id));
    const userRevs = data.reviews.filter(r=>!r.id.startsWith('dr'));
    data.reviews = [...JSON.parse(JSON.stringify(DEMO_REVIEWS)), ...userRevs];
    data._demoRev = 'v3';
    save();
  }
}catch(e){data=initData();}

// ===== 工具 =====
function $(id){return document.getElementById(id);}
function toast(msg,c='ok'){
  const el=document.createElement('div');
  el.className='toast';
  el.style.background=c==='err'?'#dc2626':c==='warn'?'#d97706':'#059669';
  el.textContent=msg;
  $('toasts').appendChild(el);
  setTimeout(()=>el.remove(),2500);
}
function closeModal(){$('modals').innerHTML='';render();}
function getEx(id){return data.exhibits.find(e=>e.id===id);}
function getRevs(eid){return data.reviews.filter(r=>r.exhibitId===eid);}
function avgRating(eid){const rs=getRevs(eid).filter(r=>r.rating>0);return rs.length?(rs.reduce((a,r)=>a+r.rating,0)/rs.length).toFixed(1):0;}
function getCheckin(eid){return data.passport.checkins.find(c=>c.exhibitId===eid);}
function fmtDate(ts){const d=new Date(ts);return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function starsHTML(n,sz=16){return[1,2,3,4,5].map(i=>`<span style="color:${i<=n?'#c8945a':'rgba(100,85,120,0.2)'};font-size:${sz}px">★</span>`).join('');}
function tasteProfile(){
  const c={};
  data.passport.checkins.forEach(ch=>{const ex=getEx(ch.exhibitId);if(!ex)return;const t=TASTE_MAP[ex.type]||'contemporary';c[t]=(c[t]||0)+1;});
  return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([id,cnt])=>({id,...TASTES[id],cnt})).filter(x=>x.l);
}

function render(){
  if(!data.setupDone){renderSetup();return;}
  $('app').innerHTML=`${renderNav()}<div id="page" class="fade"></div>`;
  const page=$('page');
  if(data.tab==='discover')page.innerHTML=renderDiscover();
  else if(data.tab==='passport')page.innerHTML=renderPassport();
  else if(data.tab==='add')page.innerHTML=renderAdd();
  else if(data.tab==='profile')page.innerHTML=renderProfile();
  bindEvents();
}
function setTab(t){data.tab=t;save();render();}

function renderNav(){
  const tabs=[{id:'discover',l:'发现',e:'🔍'},{id:'passport',l:'护照',e:'🎫'},{id:'add',l:'收录',e:'➕'},{id:'profile',l:'我的',e:'👤'}];
  return `<nav><div class="nav-inner">${tabs.map(t=>`<button class="nav-btn ${data.tab===t.id?'active':''}" onclick="setTab('${t.id}')"><span>${t.e}</span><span>${t.l}</span></button>`).join('')}</div></nav>`;
}

let _fType='',_fCity='',_fQ='',_fSort='hot';

// 虚拟距离（公里）
const MOCK_DIST={e1:2.3,e2:1205,e3:3.1,e4:1820,e5:1208,e6:1760,e7:1980,e8:1.8,e9:1640,e10:1280,e11:1350,e12:1762,e13:1250,e14:1680,e15:1720,e16:1960};

function getFilteredSorted(){
  let list=data.exhibits.filter(e=>{
    if(_fType&&e.type!==_fType)return false;
    if(_fCity&&e.city!==_fCity)return false;
    if(_fQ&&!e.name.includes(_fQ)&&!e.venue.includes(_fQ)&&!e.city.includes(_fQ))return false;
    return true;
  });
  if(_fSort==='rating') list=[...list].sort((a,b)=>parseFloat(avgRating(b.id)||0)-parseFloat(avgRating(a.id)||0));
  else if(_fSort==='reviews') list=[...list].sort((a,b)=>getRevs(b.id).length-getRevs(a.id).length);
  else if(_fSort==='dist') list=[...list].sort((a,b)=>(MOCK_DIST[a.id]||999)-(MOCK_DIST[b.id]||999));
  else list=[...list].sort((a,b)=>(getRevs(b.id).length*2+parseFloat(avgRating(b.id)||0)*3)-(getRevs(a.id).length*2+parseFloat(avgRating(a.id)||0)*3));
  return list;
}

function renderRevModal(eid){

  <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" style="padding:20px;">

        <div class="flex gap4">${[1,2,3,4,5].map(i=>`<span onclick="setRv(${i},'${eid}')" style="font-size:32px;cursor:pointer;color:${_rv.rating>=i?'#c8945a':'rgba(100,85,120,0.2)'};">★</span>`).join('')}<span class="muted fs12" style="align-self:center;margin-left:8px;">${['','太差了','不推荐','还可以','推荐','强烈推荐'][_rv.rating]||''}</span></div>

        <div class="flex wrap gap8">${QUICK_TAGS.map(t=>`<span class="tag${_rv.tags.includes(t)?' selected':''}" onclick="toggleTag('${t}','${eid}')">${t}</span>`).join('')}</div>
      </div>
      <div class="mb16">
        <p class="muted-sm mb8">说点什么（可选）</p>
        <textarea id="rv-text" placeholder="写下你的观展感受……" rows="3" oninput="_rv.text=this.value">${_rv.text}</textarea>
      </div>
      <div class="mb16">
        <p class="muted-sm mb8">上传现场照片（最多4张）</p>
        <div class="flex wrap gap8" id="photo-prev">
          ${_rv.photos.map((p,i)=>`<div style="position:relative;"><img src="${p}" style="width:64px;height:64px;object-fit:cover;border-radius:10px;"><button onclick="rmPhoto(${i},'${eid}')" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:#ef4444;border:none;border-radius:50%;color:#fff;font-size:10px;cursor:pointer;">✕</button></div>`).join('')}
          ${_rv.photos.length<4?`<label style="width:64px;height:64px;border:2px dashed rgba(155,126,184,0.35);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;color:rgba(100,80,120,0.45);">+<input type="file" accept="image/*" multiple class="hidden" onchange="addPhotos(this,'${eid}')"></label>`:''}
        </div>
      </div>
      <button class="btn-primary" onclick="submitRev('${eid}')">提交评价并打卡 🎫</button>
    </div>
  </div>`;
}
window.setRv=(n,eid)=>{_rv.rating=n;renderRevModal(eid);};
window.toggleTag=(t,eid)=>{const i=_rv.tags.indexOf(t);i>=0?_rv.tags.splice(i,1):_rv.tags.push(t);renderRevModal(eid);};
window.addPhotos=(inp,eid)=>{
  Array.from(inp.files).slice(0,4-_rv.photos.length).forEach(f=>{
    if(f.size>5*1024*1024){toast('单张不超过5MB','warn');return;}
    const r=new FileReader();r.onload=e=>{_rv.photos.push(e.target.result);renderRevModal(eid);};r.readAsDataURL(f);
  });
};
window.rmPhoto=(i,eid)=>{_rv.photos.splice(i,1);renderRevModal(eid);};
window.submitRev=eid=>{
  const text=$('rv-text')?.value?.trim()||_rv.text;
  if(!_rv.rating&&!text&&!_rv.tags.length){toast('至少留下评分或标签','warn');return;}
  data.reviews.push({id:'r'+Date.now(),exhibitId:eid,un:data.user.name,ua:data.user.avatar,rating:_rv.rating,text,tags:[..._rv.tags],photos:[..._rv.photos],ts:Date.now()});
  doCheckin(eid,false);save();toast('🎫 评价提交，护照盖章！');closeModal();
};
window.doCheckin=(eid,closeAfter)=>{
  if(!getCheckin(eid)){
    const ex=getEx(eid);
    const stamp=STAMP_MAP[ex?.type]||'🎫';
    data.passport.checkins.push({exhibitId:eid,ts:Date.now()});
    if(!data.passport.stamps.includes(stamp))data.passport.stamps.push(stamp);
    save();
  }
  if(closeAfter){toast('✓ 打卡成功！');closeModal();}
};

      <input type="text" id="e-name" maxlength="12" placeholder="昵称" value="${data.user.name}" style="margin-bottom:10px;">
      <input type="text" id="e-city" maxlength="8" placeholder="城市" value="${data.user.city}" style="margin-bottom:16px;">
      <div class="avatar-grid mb16">${AVATARS.map(e=>`<button class="avatar-btn${data.user.avatar===e?' sel':''}" onclick="data.user.avatar='${e}';save();closeModal();render();">${e}</button>`).join('')}</div>
      <button class="btn-primary" onclick="saveProfile()">保存</button>
    </div>
  </div>`;
};
window.saveProfile=()=>{
  const name=$('e-name')?.value?.trim();
  if(!name){toast('名字不能为空','err');return;}
  data.user.name=name;data.user.city=$('e-city')?.value?.trim()||data.user.city;save();toast('已保存');closeModal();
};
window.resetAll=()=>{localStorage.removeItem('zl2_data');data=initData();render();};
function bindEvents(){}

render();
</script>
</body>
</html>
