<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薯宫 🍠 — 你的时光树洞</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
* { font-family: 'Noto Sans SC', sans-serif; }
body { background: #1a1a2e; min-height: 100vh; }

.handwriting { font-family: 'Ma Shan Zheng', cursive; }

/* 星空背景 */
.stars { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
.star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--dur, 3s) ease-in-out infinite; opacity: var(--op, 0.6); }
@keyframes twinkle { 0%,100%{opacity:var(--op);transform:scale(1)} 50%{opacity:0.1;transform:scale(0.5)} }

/* 卡片浮现 */
.fade-in { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* 信封打开 */
.envelope { cursor: pointer; transition: transform 0.3s; }
.envelope:hover { transform: translateY(-4px) rotate(-1deg); }

/* 红薯抖动 */
@keyframes wiggle { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
.wiggle { animation: wiggle 0.5s ease-in-out 3; }

/* 进度条 */
.progress-bar { transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1); }

/* 信纸纹理 */
.paper {
  background: #fdfaf3;
  background-image: repeating-linear-gradient(transparent, transparent 27px, #e8e0d0 27px, #e8e0d0 28px);
  line-height: 28px;
}

/* 粒子 */
@keyframes float-up { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.3)} }
.particle { position:fixed; pointer-events:none; animation: float-up 1.5s ease-out forwards; font-size:24px; z-index:999; }

/* 徽章闪光 */
@keyframes shine { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.4)} }
.badge-shine { animation: shine 2s ease-in-out infinite; }

/* 模态框 */
.modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px; }

/* 通知条 */
.toast { position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;padding:12px 24px;border-radius:24px;font-size:14px;animation:fadeIn 0.3s ease; }

/* 滚动条 */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #4a3f6b; border-radius: 4px; }

/* tab激活 */
.tab-active { background: linear-gradient(135deg, #9333ea, #ec4899); color: white; }
</style>
</head>

// ========== 施肥规则 ==========
// 每种类型打卡累计次数达到阈值，奖励施肥机会
const FERTILIZER_RULES = [
  { type: 'exercise',      threshold: 3,  reward: 1, desc: '运动打卡满3次' },
  { type: 'exercise',      threshold: 7,  reward: 1, desc: '运动打卡满7次' },
  { type: 'study',         threshold: 3,  reward: 1, desc: '学习打卡满3次' },
  { type: 'study',         threshold: 7,  reward: 1, desc: '学习打卡满7次' },
  { type: 'family',        threshold: 2,  reward: 1, desc: '陪伴家人满2次' },
  { type: 'digital_detox', threshold: 3,  reward: 2, desc: '防沉迷打卡满3次（双倍奖励！）' },
  { type: 'sleep',         threshold: 5,  reward: 1, desc: '规律作息满5次' },
  { type: 'creative',      threshold: 3,  reward: 1, desc: '创意输出满3次' },
  // 混合奖励：任意累计打卡次数
  { type: 'any',           threshold: 10, reward: 1, desc: '任意打卡累计满10次' },
  { type: 'any',           threshold: 30, reward: 2, desc: '任意打卡累计满30次' },
  { type: 'any',           threshold: 60, reward: 3, desc: '任意打卡累计满60次' },
];

function calcFertilizerCharges() {
  // 重新计算应得的施肥次数（累计）
  let total = 0;
  FERTILIZER_RULES.forEach(rule => {
    if (rule.type === 'any') {
      const count = data.checkins.length;
      if (count >= rule.threshold) total += rule.reward;
    } else {
      const count = data.checkins.filter(c => c.type === rule.type).length;
      if (count >= rule.threshold) total += rule.reward;
    }
  });
  return total;
}

function getNextFertilizerHint() {
  // 找到最近快达成的目标
  for (const rule of FERTILIZER_RULES) {
    let count = rule.type === 'any' ? data.checkins.length : data.checkins.filter(c=>c.type===rule.type).length;
    if (count < rule.threshold) {
      const remaining = rule.threshold - count;
      return `再${rule.type==='any'?'打卡':'做「'+CHECKIN_TYPES.find(x=>x.id===rule.type)?.label+'」'}${remaining}次，可获得${rule.reward}次施肥机会`;
    }
  }
  return '所有施肥奖励已解锁！';
}

// ========== 工具函数 ==========
function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
function daysUntil(ts) {
  const diff = ts - Date.now();
  return Math.max(0, Math.ceil(diff / 86400000));
}
function isToday(ts) {
  const d = new Date(ts), t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}
function getStage(points) {
  for (let i = PLANT_STAGES.length-1; i >= 0; i--) {
    if (points >= PLANT_STAGES[i].threshold) return i;
  }
  return 0;
}
function getProgress(points) {
  const stage = getStage(points);
  if (stage >= PLANT_STAGES.length-1) return 100;
  const cur = PLANT_STAGES[stage].threshold;
  const next = PLANT_STAGES[stage+1].threshold;
  return Math.round((points - cur) / (next - cur) * 100);
}

// ========== 星空生成 ==========
function generateStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;
      --op:${0.3+Math.random()*0.7};
      animation-delay:${Math.random()*4}s;
    `;
    container.appendChild(star);
  }
}

// ========== Toast ==========
function showToast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type==='success'?'bg-emerald-600':'type==="error"?bg-red-600:bg-purple-600'}`;
  el.style.cssText = `background:${type==='success'?'#059669':type==='error'?'#dc2626':'#7c3aed'}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}

// ========== 粒子特效 ==========
function spawnParticles(emoji, x, y, count=6) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emoji;
    el.style.cssText = `left:${x + (Math.random()-0.5)*80}px;top:${y}px;animation-delay:${Math.random()*0.3}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2000);
  }
}

    { name: "万圣节",     emoji: "🎃", month: 9,  day: 31 },
  ];
  const SUGGESTIONS = {
    "元旦":     { to: '自己', hint: '新的一年开始了，给一年后的自己留下此刻的心愿吧' },
    "情人节":   { to: '另一半', hint: '把此刻的心意，封存给未来的 Ta' },
    "妇女节":   { to: '妈妈', hint: '给妈妈写一封她在特别日子才能看到的信' },
    "儿童节":   { to: '自己', hint: '给内心那个小孩写封信，问问 ta 还好吗' },
    "七夕":     { to: '另一半', hint: '七夕前后，把最想说的话悄悄藏起来' },
    "中秋节":   { to: '家人', hint: '月圆之夜，给远方的家人写封信吧' },
    "国庆节":   { to: '自己', hint: '假期里，给未来的自己留下此刻的状态' },
    "圣诞节":   { to: '朋友', hint: '平安夜，给一个特别的人送去跨越时间的祝福' },
    "母亲节":   { to: '妈妈', hint: '写下你想对妈妈说的话，让她在未来某天收到' },
    "父亲节":   { to: '爸爸', hint: '给爸爸写一封他在未来才能看到的信' },
    "感恩节":   { to: '自己', hint: '感恩节，写下此刻你感激的一切' },
    "万圣节":   { to: '自己', hint: '在这个神秘的夜晚，留下一个只有你知道的秘密' },
  };
  const results = [];
  fixed.forEach(f => {
    let d = new Date(year, f.month, f.day);

// ========== 检查到期信件 ==========
function checkArrivedLetters() {
  const arrived = data.letters.filter(l => !l.opened && !l.archived && l.deliverAt <= Date.now());
  return arrived;
}

// ========== 主渲染 ==========
function render() {
  if (!data.setupDone) { renderSetup(); return; }
  const arrived = checkArrivedLetters();
  document.getElementById('app').innerHTML = `
    ${arrived.length > 0 ? renderArrivalBanner(arrived) : ''}
    ${renderNav()}
    <div class="max-w-lg mx-auto px-4 pb-24 pt-4">
      ${data.tab==='home' ? renderHome() : ''}
      ${data.tab==='write' ? renderWrite() : ''}
      ${data.tab==='mailbox' ? renderMailbox() : ''}
      ${data.tab==='garden' ? renderGarden() : ''}
      ${data.tab==='checkin' ? renderCheckin() : ''}

}

function getRandomPrompt(type) {
  const prompts = DELIVERY_PROMPTS[type] || DELIVERY_PROMPTS.letter;
  return prompts[Math.floor(Math.random() * prompts.length)];
}

function renderLetterCard(l, isArrived, isOpened=false) {

        <div class="text-xs text-white/40 mt-0.5">

            isOpened ? `已读 · ${formatDate(l.deliverAt)}` :

        ${!isOpened && !isArrived ? `
        <div class="mt-2 h-1 bg-white/10 rounded-full overflow-hidden">

      ${isArrived ? '<div class="w-2 h-2 bg-rose-400 rounded-full flex-shrink-0 mt-1"></div>' : ''}

  </div>`;
}

          💧 浇水 ${canWater ? '' : '(今日已浇)'}
        </button>
        <button onclick="fertilizePlant(event)" ${data.plant.fertilizerCharges <= 0 ? 'disabled' : ''}
          class="flex-1 py-3 rounded-xl ${data.plant.fertilizerCharges > 0 ? 'bg-amber-500/80 hover:bg-amber-400/80' : 'bg-white/10 text-white/30'} text-sm font-medium transition-all">
          🌿 施肥 ×${data.plant.fertilizerCharges}
        </button>
      </div>
      <div class="text-xs text-white/30 text-center mt-2">${getNextFertilizerHint()}</div>
    </div>

    <!-- 图鉴 -->
    <div class="bg-white/5 rounded-2xl p-4 border border-white/10">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-medium">红薯图鉴</span>
        <span class="text-xs text-white/40">${data.unlockedForms.length}/10 已解锁</span>
      </div>
      <div class="grid grid-cols-5 gap-2">
        ${SWEET_POTATO_FORMS.map(f => {
          const unlocked = data.unlockedForms.includes(f.id);
          const isCurrent = data.plant.form === f.id && stage >= 5;
          return `
          <div title="${unlocked ? f.name + ' - ' + f.desc : '???'}"
            class="aspect-square rounded-xl flex items-center justify-center text-2xl transition-all cursor-pointer
              ${unlocked ? (isCurrent ? 'bg-purple-500/40 border-2 border-purple-400' : 'bg-white/10 hover:bg-white/20') : 'bg-white/5 opacity-30 grayscale'}">
            ${unlocked ? f.emoji : '❓'}
          </div>`;
        }).join('')}
      </div>
      <div class="mt-3 space-y-1">
        ${SWEET_POTATO_FORMS.filter(f=>data.unlockedForms.includes(f.id)).map(f=>`
        <div class="flex items-center gap-2 text-xs">
          <span>${f.emoji}</span>
          <span class="text-white/60">${f.name}</span>
          <span class="text-white/30 ml-auto">${f.rarity}</span>
        </div>`).join('')}
      </div>
    </div>

    <!-- 成长日志 -->
    ${data.checkins.length > 0 ? `
    <div class="bg-white/5 rounded-2xl p-4 border border-white/10 mt-4">
      <div class="text-sm font-medium mb-3">🌱 成长日志</div>
      <div class="space-y-2 max-h-48 overflow-y-auto">
        ${data.checkins.slice().reverse().map(c=>{
          const ct = CHECKIN_TYPES.find(x=>x.id===c.type);
          return `
          <div class="flex items-center gap-2 text-xs text-white/60">
            <span>${ct?.emoji||'✓'}</span>
            <span>${ct?.label||'打卡'}</span>
            <span class="text-white/30">· ${c.item}</span>
            <span class="ml-auto text-green-400">+${c.points}分</span>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}
  </div>`;
}

// ========== 打卡页 ==========
function renderCheckin() {
  const todayCheckins = data.checkins.filter(c => isToday(c.timestamp));

  return `
  <div class="fade-in">
    <h2 class="text-xl font-bold mb-1 handwriting">今日打卡 ⏰</h2>
    <p class="text-white/50 text-sm mb-2">自律是给红薯最好的肥料</p>
    <div class="text-xs text-white/30 mb-6">今日已打卡 ${todayCheckins.length} 次 · 共获得 ${todayCheckins.reduce((a,c)=>a+c.points,0)} 积分</div>

    <div class="space-y-3">
      ${CHECKIN_TYPES.map(ct => {
        const todayCount = todayCheckins.filter(c=>c.type===ct.id).length;
        return `
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4">
          <div class="flex items-center gap-3 mb-3">
            <div class="text-2xl">${ct.emoji}</div>
            <div class="flex-1">
              <div class="font-medium text-sm">${ct.label}</div>
              <div class="text-xs text-white/40">${ct.desc} · +${ct.points}分</div>
            </div>
            ${todayCount > 0 ? `<span class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded-full">今日×${todayCount}</span>` : ''}
          </div>
          <div class="flex flex-wrap gap-2">
            ${ct.items.map(item => `
            <button onclick="doCheckin('${ct.id}','${item}',${ct.points},event)"
              class="text-xs bg-white/10 hover:bg-purple-500/30 border border-white/10 hover:border-purple-400/40 rounded-full px-3 py-1.5 transition-all">
              ${item}
            </button>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="bg-white/5 rounded-2xl p-4 border border-white/10 mt-4 text-center">
      <div class="text-3xl mb-2">🌱</div>
      <div class="text-sm text-white/60">每一次打卡，都是给红薯的一次浇水</div>
      <div class="text-xs text-white/30 mt-1">积累 ${PLANT_STAGES[Math.min(getStage(data.plant.totalPoints)+1, PLANT_STAGES.length-1)].threshold - data.plant.totalPoints} 分后，红薯将进入下一阶段</div>
    </div>
  </div>`;
}

// ========== 操作函数 ==========
window.selectAvatar = (e) => { data.user.avatar = e; saveData(); renderSetup(); };
window.finishSetup = () => {
  const name = document.getElementById('setup-name')?.value?.trim();
  if (!name) { showToast('起个名字吧～', 'error'); return; }
  data.user.name = name;
  data.setupDone = true;
  // 解锁初始形态
  data.plant.form = Math.floor(Math.random() * 10);
  data.unlockedForms = [data.plant.form];
  saveData();
  showToast('🌰 你的红薯种子种下了！');
  render();
};

window.setTab = (tab) => { data.tab = tab; saveData(); render(); };

window.selectLetterType = (id) => { writeState.type = id; render(); };
window.nextWriteStep = () => { if (writeState.type) { writeState.step = 2; render(); } };
window.setDeliverDate = (date) => { writeState.deliverDate = date; render(); };
window.previewLetter = () => {
  const content = document.getElementById('letter-content')?.value?.trim();
  const title = document.getElementById('letter-title')?.value?.trim();
  const date = document.getElementById('deliver-date')?.value;
  const uid = document.getElementById('recipient-uid')?.value?.trim();
  writeState.content = content || writeState.content;
  writeState.title = title || writeState.title;
  writeState.deliverDate = date || writeState.deliverDate;
  writeState.recipientUid = uid || writeState.recipientUid;
  if (!writeState.content) { showToast('写点什么吧～', 'error'); return; }
  writeState.step = 3;
  render();
};
window.sealLetter = () => {
  const deliverDate = writeState.deliverDate || new Date(Date.now() + 365*86400000).toISOString().split('T')[0];
  const letter = {
    id: 'l-' + Date.now(),
    type: writeState.type || 'letter',
    title: writeState.title || '一封信',
    content: writeState.content,
    deliverAt: new Date(deliverDate).getTime(),
    createdAt: Date.now(),
    toSelf: writeState.toSelf,
    recipientUid: writeState.recipientUid,
    opened: false,
    archived: false,
  };
  data.letters.push(letter);
  // 写信奖励
  data.plant.totalPoints += 5;
  data.plant.stage = getStage(data.plant.totalPoints);
  checkUnlock();
  saveData();
  writeState = { step: 1, type: '', title: '', content: '', deliverDate: '', toSelf: true, recipientUid: '' };
  showToast('✉️ 信已封存，在约定的日期你会看到它');
  data.tab = 'mailbox';
  render();
};

window.openLetter = (id) => {
  const letter = data.letters.find(l => l.id === id);
  if (!letter) return;
  const lt = LETTER_TYPES.find(x=>x.id===letter.type) || LETTER_TYPES[4];
  const isArrived = letter.deliverAt <= Date.now();
  const prompt = getRandomPrompt(letter.type);

  document.getElementById('modals').innerHTML = `
  <div class="modal-overlay" onclick="closeModal(event)">
    <div class="w-full max-w-sm bg-gradient-to-b from-purple-950 to-indigo-950 rounded-3xl border border-purple-400/30 overflow-hidden" onclick="event.stopPropagation()">
      <div class="bg-gradient-to-br ${lt.color} p-6 text-center">
        <div class="text-5xl mb-2">${lt.emoji}</div>
        <div class="handwriting text-xl">${letter.title}</div>
        ${isArrived ? `<div class="text-white/80 text-sm mt-1">${prompt}</div>` : ''}
      </div>
      <div class="p-5">
        ${isArrived ? `
        <div class="paper rounded-2xl p-4 text-gray-800 text-sm leading-7 max-h-64 overflow-y-auto mb-4">
          ${letter.content.replace(/\n/g,'<br>')}
        </div>
        <div class="text-xs text-white/40 text-center mb-4">
          写于 ${formatDate(letter.createdAt)} · 投递于 ${formatDate(letter.deliverAt)}
          ${!letter.toSelf && letter.recipientUid ? ` · 写给 UID:${letter.recipientUid}` : ''}
        </div>` : `
        <div class="text-center py-6">
          <div class="text-4xl mb-3">🔒</div>
          <div class="text-white/60 text-sm">这封信还在路上</div>
          <div class="text-white/40 text-xs mt-1">${daysUntil(letter.deliverAt)} 天后，它会出现在你面前</div>
        </div>`}
        <button onclick="closeModal()" class="w-full py-3 rounded-2xl bg-white/10 text-white/60 text-sm hover:bg-white/20">关闭</button>
        ${isArrived && !letter.opened ? `
        <button onclick="markOpened('${letter.id}')" class="w-full mt-2 py-3 rounded-2xl bg-purple-500 text-white text-sm font-medium">
          已读，封存这段记忆 ✓
        </button>` : ''}
      </div>
    </div>
  </div>`;

  if (isArrived && !letter.opened) {
    // 积分奖励
    data.plant.totalPoints += 3;
    checkUnlock();
    saveData();
  }
};

window.markOpened = (id) => {
  const letter = data.letters.find(l => l.id === id);
  if (letter) { letter.opened = true; saveData(); }
  closeModal();
  render();
};

window.closeModal = (e) => {
  if (!e || e.target === e.currentTarget || e.type === 'click') {
    document.getElementById('modals').innerHTML = '';
    render();
  }
};

window.waterPlant = (e) => {
  if (data.plant.lastWatered && isToday(data.plant.lastWatered)) {
    showToast('今天已经浇过水了，明天再来～', 'error');
    return;
  }
  data.plant.lastWatered = Date.now();
  data.plant.totalPoints += 3;
  data.plant.stage = getStage(data.plant.totalPoints);
  checkUnlock();
  saveData();
  spawnParticles('💧', e.clientX, e.clientY);
  showToast('💧 浇水成功！+3分');
  render();
};

window.fertilizePlant = (e) => {
  if (data.plant.fertilizerCharges <= 0) {
    showToast('没有施肥机会了，去打卡解锁吧！', 'error');
    return;
  }
  data.plant.fertilizerCharges -= 1;
  data.plant.totalPoints += 5;
  data.plant.stage = getStage(data.plant.totalPoints);
  checkUnlock();
  saveData();
  spawnParticles('🌿', e.clientX, e.clientY);
  showToast(`🌿 施肥成功！+5分（剩余 ${data.plant.fertilizerCharges} 次）`);
  render();
};

window.doCheckin = (type, item, points, e) => {
  const checkin = { id:'c-'+Date.now(), type, item, points, timestamp: Date.now() };
  data.checkins.push(checkin);
  data.plant.totalPoints += points;
  data.plant.stage = getStage(data.plant.totalPoints);
  // 重新计算施肥次数（已用过的不退还，只补充差值）
  const earned = calcFertilizerCharges();
  const used = (data.plant._fertilizerEarned || 0) - data.plant.fertilizerCharges;
  const newCharges = Math.max(0, earned - Math.max(0, used));
  if (newCharges > data.plant.fertilizerCharges) {
    const gained = newCharges - data.plant.fertilizerCharges;
    data.plant.fertilizerCharges = newCharges;
    setTimeout(() => showToast(`🌿 解锁 ${gained} 次施肥机会！`), 600);
  }
  data.plant._fertilizerEarned = earned;
  checkUnlock();
  saveData();
  spawnParticles('⭐', e.clientX, e.clientY, 4);
  showToast(`${CHECKIN_TYPES.find(x=>x.id===type)?.emoji} ${item} · +${points}分！`);
  render();
};

window.applyFestivalHint = (dateStr, to) => {
  writeState.deliverDate = dateStr;
  writeState.toSelf = (to === '自己');
  writeState.step = 1;
  render();
  setTimeout(() => showToast(`已设置投递到节日当天 🎉`), 100);
};

function checkUnlock() {
  // 根据积分解锁新形态
  const thresholds = [0,20,50,80,120,160,200,250,300,400];
  thresholds.forEach((t,i) => {
    if (data.plant.totalPoints >= t && !data.unlockedForms.includes(i)) {
      data.unlockedForms.push(i);
      setTimeout(() => showToast(`🎉 解锁新形态：${SWEET_POTATO_FORMS[i].name} ${SWEET_POTATO_FORMS[i].emoji}`), 500);
    }
  });
  // 成熟后随机显示解锁的形态之一
  if (getStage(data.plant.totalPoints) >= 5 && data.plant.form === 0) {
    const available = data.unlockedForms;
    data.plant.form = available[Math.floor(Math.random() * available.length)];
  }
}

// ========== 初始化 ==========
generateStars();
render();
</script>
</body>
</html>
